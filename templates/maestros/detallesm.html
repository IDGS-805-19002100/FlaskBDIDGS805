{% extends "layout.html"%} 
{% block container%}
<div class="group py-32 flex justify-center">
    <div class="relative bg-white max-w-xs w-full p-6 border border-gray-200 rounded-2xl shadow-xl">
        <div class="flex flex-col items-center text-center">
            <img class="w-24 h-24 mb-6 rounded-full shadow-md" src="{{url_for('static',filename='img/ingesistemas.jpg')}}" alt="Maestro image"/>
            
            <h5 class="text-xl font-bold text-gray-900">{{nombre}} {{apaterno}}</h5>
            <p class="text-blue-600 font-medium text-sm mb-2">{{especialidad}}</p>
            <p class="text-gray-500 text-sm italic">{{email}}</p>
            
            <div class="flex mt-8 w-full">
                <a href="{{ url_for('maestros.lista_maestros') }}" class="w-full inline-flex items-center justify-center px-6 py-3 text-sm font-bold text-white bg-blue-600 rounded-xl hover:bg-blue-700 transition-all">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 19l-7-7m0 0l7-7m-7 7h18" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    Regresar al Listado
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
