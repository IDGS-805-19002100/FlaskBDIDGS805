<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask IDGS - Sistema Escolar</title>
    <link rel="stylesheet" href="{{url_for('static',filename='dist/output.css')}}">
</head>
<body class="bg-gray-50 pb-24"> <nav class="bg-white border-gray-200 px-2 sm:px-4 py-2.5 dark:bg-gray-900 shadow-md sticky top-0 z-40">
        <div class="container flex flex-wrap items-center justify-between mx-auto">
            <a href="{{ url_for('index') }}" class="flex items-center">
                <img src="{{url_for('static',filename='img/IDGS805.png')}}" class="rounded-xl h-8 mr-3" alt="Logo">
                <span class="self-center text-xl font-bold whitespace-nowrap dark:text-white">Flask School</span>
            </a>
            
            <div class="flex md:order-2">
                <span class="hidden md:inline-flex text-blue-700 bg-blue-50 border border-blue-100 font-medium rounded-lg text-sm px-4 py-2 text-center">
                    IDGS805 - Proyecto
                </span>
                <button data-collapse-toggle="navbar-cta" type="button" class="inline-flex items-center p-2 text-sm text-gray-500 rounded-lg md:hidden hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-200" aria-controls="navbar-cta" aria-expanded="false">
                    <span class="sr-only">Menu</span>
                    <svg class="w-6 h-6" aria-hidden="true" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"></path></svg>
                </button>
            </div>

            <div class="items-center justify-between hidden w-full md:flex md:w-auto md:order-1" id="navbar-cta">
                <ul class="flex flex-col p-4 mt-4 border border-gray-100 rounded-lg bg-gray-50 md:flex-row md:space-x-8 md:mt-0 md:text-sm md:font-medium md:border-0 md:bg-white">
                    <li>
                        <a href="{{ url_for('index') }}" class="block py-2 pl-3 pr-4 text-blue-700 font-bold" aria-current="page">Inicio</a>
                    </li>
                    <li>
                        <a href="{{ url_for('alumnos.listado_alumnos') }}" class="block py-2 pl-3 pr-4 text-gray-700 hover:text-blue-700">Alumnos</a>
                    </li>
                    <li>
                        <a href="{{ url_for('maestros.lista_maestros') }}" class="block py-2 pl-3 pr-4 text-gray-700 hover:text-blue-700">Maestros</a>
                    </li>
                    <li>
                        <a href="{{ url_for('cursos.lista_cursos') }}" class="block py-2 pl-3 pr-4 text-indigo-600 font-semibold hover:text-indigo-800">Cursos</a>
                    </li>
                    <li>
                        <a href="{{ url_for('inscripciones.consultar_inscripciones') }}" class="block py-2 pl-3 pr-4 text-green-600 font-semibold hover:text-green-800">Inscripciones</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
   
    <div class="container mx-auto px-4 py-8">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div id="alert-3" class="flex items-center p-4 mb-4 text-blue-800 rounded-lg bg-blue-50 border border-blue-200 shadow-sm" role="alert">
                        <svg class="flex-shrink-0 w-4 h-4" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20"><path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5ZM9.5 4a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3ZM12 15H8a1 1 0 0 1 0-2h1v-3H8a1 1 0 0 1 0-2h2a1 1 0 0 1 1 1v4h1a1 1 0 0 1 0 2Z"/></svg>
                        <div class="ms-3 text-sm font-medium">{{ message }}</div>
                        <button type="button" class="ms-auto -mx-1.5 -my-1.5 bg-blue-50 text-blue-500 rounded-lg focus:ring-2 focus:ring-blue-400 p-1.5 hover:bg-blue-200 inline-flex items-center justify-center h-8 w-8" data-dismiss-target="#alert-3" aria-label="Close">
                          <span class="sr-only">Close</span>
                          <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/></svg>
                        </button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
       
        {% block container %}
        {% endblock %}
    </div>

    <div class="fixed z-50 w-full h-16 max-w-md -translate-x-1/2 bg-white border border-gray-200 rounded-full bottom-4 left-1/2 shadow-2xl flex items-center justify-around px-4">
        <a href="{{ url_for('index') }}" class="inline-flex flex-col items-center justify-center p-4 rounded-full hover:bg-gray-100 group">
            <svg class="w-6 h-6 text-gray-500 group-hover:text-blue-600" fill="currentColor" viewBox="0 0 20 20"><path d="m19.707 9.293-2-2-7-7a1 1 0 0 0-1.414 0l-7 7-2 2a1 1 0 0 0 1.414 1.414L2 10.414V18a2 2 0 0 0 2 2h3a1 1 0 0 0 1-1v-4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v4a1 1 0 0 0 1 1h3a2 2 0 0 0 2-2v-7.586l.293.293a1 1 0 0 0 1.414-1.414Z"/></svg>
            <span class="sr-only">Inicio</span>
        </a>
        
        <a href="{{ url_for('inscripciones.inscribir_alumno') }}" class="flex items-center justify-center w-12 h-12 bg-blue-600 text-white rounded-full hover:bg-blue-700 shadow-lg transform active:scale-95 transition-all">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        </a>

        <a href="{{ url_for('alumnos.listado_alumnos') }}" class="inline-flex flex-col items-center justify-center p-4 rounded-full hover:bg-gray-100 group">
            <svg class="w-6 h-6 text-gray-500 group-hover:text-blue-600" fill="currentColor" viewBox="0 0 20 20"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"/></svg>
            <span class="sr-only">Alumnos</span>
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.js"></script>
</body>
</html>
