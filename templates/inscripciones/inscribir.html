{% extends "layout.html" %} 

{% block container %}
<div class="flex items-center justify-center min-h-[80vh] px-4">
    <div class="w-full max-w-lg p-8 bg-white rounded-2xl shadow-xl border border-gray-100">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-gray-900">Inscripción de Alumnos</h2>
            <p class="text-gray-500 text-sm mt-2">Relaciona a un estudiante con una materia disponible</p>
        </div>
        
        <form method="POST" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            
            <div class="space-y-4">
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-100">
                    <label class="block text-sm font-bold text-gray-700 mb-2">Seleccionar Alumno</label>
                    <select name="alumno_id" class="w-full rounded-xl border-gray-200 focus:ring-blue-500 focus:border-blue-500">
                        {% for alumno in alumnos %}
                        <option value="{{ alumno.id }}">{{ alumno.nombre }} {{ alumno.apaterno }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="bg-gray-50 p-4 rounded-lg border border-gray-100">
                    <label class="block text-sm font-bold text-gray-700 mb-2">Seleccionar Curso</label>
                    <select name="curso_id" class="w-full rounded-xl border-gray-200 focus:ring-blue-500 focus:border-blue-500">
                        {% for curso in cursos %}
                        <option value="{{ curso.id }}">{{ curso.nombre }} (Maestro: {{ curso.maestro.nombre }})</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="flex flex-col gap-3 pt-4">
                <button type="submit" class="w-full text-white bg-green-600 hover:bg-green-700 focus:ring-4 focus:ring-green-200 font-bold rounded-xl text-sm px-5 py-3.5 transition-all shadow-lg shadow-green-100">
                    Confirmar Inscripción
                </button>
                <a href="/" class="w-full text-center text-gray-500 bg-gray-100 hover:bg-gray-200 font-medium rounded-xl text-sm px-5 py-3 transition-colors">
                    Volver al Inicio
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
