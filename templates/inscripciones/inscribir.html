{% extends "layout.html" %} 

{% block container %}
<div class="flex items-center justify-center min-h-[80vh] px-4">
    <div class="w-full max-w-lg p-8 bg-white rounded-3xl shadow-2xl border border-gray-100">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-green-100 text-green-600 rounded-full mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
                </svg>
            </div>
            <h2 class="text-3xl font-black text-gray-900 tracking-tight">Nueva Inscripción</h2>
            <p class="text-gray-500 text-sm mt-2 font-medium">Asigna un alumno a un curso disponible</p>
        </div>
        
        <form method="POST" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            
            <div class="space-y-4">
                <div class="bg-blue-50 p-5 rounded-2xl border border-blue-100 transition-all focus-within:ring-2 focus-within:ring-blue-400">
                    <label class="block text-xs font-black text-blue-700 uppercase tracking-widest mb-2">Seleccionar Alumno</label>
                    <div class="relative">
                        <select name="alumno_id" class="appearance-none w-full rounded-xl border-gray-200 focus:border-blue-500 bg-white p-3.5 shadow-sm text-sm font-bold text-gray-700 cursor-pointer">
                            {% for alumno in alumnos %}
                                <option value="{{ alumno.id }}">{{ alumno.nombre }} {{ alumno.apellidos }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="bg-indigo-50 p-5 rounded-2xl border border-indigo-100 transition-all focus-within:ring-2 focus-within:ring-indigo-400">
                    <label class="block text-xs font-black text-indigo-700 uppercase tracking-widest mb-2">Seleccionar Curso</label>
                    <div class="relative">
                        <select name="curso_id" class="appearance-none w-full rounded-xl border-gray-200 focus:border-indigo-500 bg-white p-3.5 shadow-sm text-sm font-bold text-gray-700 cursor-pointer">
                            {% for curso in cursos %}
                                <option value="{{ curso.id }}">{{ curso.nombre }} (ID: {{ curso.id }})</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-3 pt-4">
                <button type="submit" 
                        style="background-color: #16a34a;" 
                        class="w-full text-white font-black rounded-2xl text-base px-5 py-4 transition-all hover:scale-[1.02] active:scale-95 shadow-lg shadow-green-200 uppercase tracking-wide">
                    Confirmar Inscripción
                </button>
                
                <a href="{{ url_for('index') }}" 
                   class="w-full text-center text-gray-500 bg-gray-50 hover:bg-gray-100 font-bold rounded-2xl text-sm px-5 py-3.5 transition-colors border border-gray-100">
                    Cancelar y Volver
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
