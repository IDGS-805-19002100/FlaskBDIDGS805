{% extends "layout.html" %}
{% block container %}
<div class="max-w-4xl mx-auto">
    <h2 class="text-2xl font-bold mb-6 text-green-700">Registro Global de Inscripciones</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        {% for registro in inscripciones %}
        <div class="p-6 bg-white border border-gray-200 rounded-xl shadow-sm">
            <h5 class="mb-2 text-xl font-bold tracking-tight text-gray-900">
                {{ registro.curso_id }} - (ID Curso)
            </h5>
            <p class="font-normal text-gray-700">
                <span class="font-bold">Alumno ID:</span> {{ registro.alumno_id }}<br>
                <span class="font-bold">Fecha:</span> {{ registro.fecha_inscripcion.strftime('%d/%m/%Y %H:%M') }}
            </p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
